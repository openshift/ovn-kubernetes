apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: vlan-policy-dualstack-template
objects:
- kind: NodeNetworkConfigurationPolicy
  apiVersion: nmstate.io/v1
  metadata:
    name: "${NAME}"
  spec:
    nodeSelector:
      "${NODELABEL}": "${LABELVALUE}"
    desiredState:
      interfaces:
      - name: "${IFACENAME}"
        description: "${DESCR}"
        type: vlan
        state: "${STATE}"
        vlan:
          base-iface: "${BASEIFACE}"
          id: "${{VLANID}}"
        ipv4:
          address:
          - ip: "${IPADDRV4}"
            prefix-length: 24
          enabled: true
          dhcp: false
        ipv6:
          address:
          - ip: "${IPADDRV6}"
            prefix-length: 64
          enabled: true
          dhcp: false
      routes:
        config:
        - destination: 0.0.0.0/0
          metric: 999
          next-hop-address: "${IPGATEWAYV4}"
          next-hop-interface: "${IFACENAME}"
          table-id: 254
        - destination: ::/0
          metric: 999
          next-hop-address: "${IPGATEWAYV6}"
          next-hop-interface: "${IFACENAME}"
          table-id: 254
parameters:
- name: NAME
- name: NODELABEL
  value: "node-role.kubernetes.io/worker"
- name: LABELVALUE
  value: ""
- name: IFACENAME
- name: DESCR
- name: STATE
- name: BASEIFACE
- name: VLANID
- name: IPADDRV4
- name: IPADDRV6
- name: IPGATEWAYV4
- name: IPGATEWAYV6
