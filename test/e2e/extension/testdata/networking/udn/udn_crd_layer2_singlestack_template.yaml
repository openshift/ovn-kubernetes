apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: udn-crd-layer2-singlestack-template
objects:
- apiVersion: k8s.ovn.org/v1
  kind: UserDefinedNetwork
  metadata:
    name:  "${CRDNAME}"
    namespace: "${NAMESPACE}"
  spec:
    topology: Layer2
    layer2:
      role: "${ROLE}"
      subnets: ["${CIDR}"]
parameters:
- name: CRDNAME
- name: NAMESPACE
- name: CIDR
- name: ROLE
