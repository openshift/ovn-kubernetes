# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  slop_detection:
    enabled: true
    label: "coderabbit/ai-slop"
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/vendor/**"
chat:
  auto_reply: true
