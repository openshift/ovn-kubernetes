apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: udn-statefulset-template
objects:
- apiVersion: apps/v1
  kind: StatefulSet
  metadata:
    labels:
      app: ${LABEL}
      name: ${LABEL}
    name: ${NAME}
    namespace: ${NAMESPACE}
  spec:
    replicas: 5
    selector:
      matchLabels:
        app: ${LABEL}
    serviceName: hello
    template:
      metadata:
        labels:
          app: ${LABEL}
        annotations:
          k8s.v1.cni.cncf.io/networks: '[{"name": "${NETWORK_NAME}","interface": "${INTERFACE_NAME}"}]'
      spec:
        containers:
        - image: quay.io/openshifttest/hello-sdn@sha256:c89445416459e7adea9a5a416b3365ed3d74f2491beb904d61dc8d1eb89a72a4 
          name: hello
          ports:
          - containerPort: 8080
            name: web
            protocol: TCP
          resources:
            limits:
              memory: 340Mi
        restartPolicy: Always
parameters:
- name: NAME
  value: "hello"
- name: NAMESPACE
- name: LABEL
  value: "hello"
- name: NETWORK_NAME
- name: INTERFACE_NAME
  value: "ovn-udn1"
